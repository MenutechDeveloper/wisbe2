<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wisbe - Laboratorio de Widgets (Custom Elements)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="./assets/css/styleGYM.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-50 min-h-screen p-4 md:p-12">
    <nav id="main-nav"></nav>

    <main class="max-w-6xl mx-auto">
        <header class="mb-12 text-center">
            <div class="inline-block px-4 py-1 bg-blue-50 text-blue-600 text-xs font-black uppercase tracking-widest rounded-full mb-4">Herramienta de Diagnóstico (v2)</div>
            <h1 class="text-4xl font-black text-slate-900 tracking-tighter uppercase mb-4">Laboratorio de Custom Elements</h1>
            <p class="text-slate-500 font-medium max-w-2xl mx-auto italic">Prueba los nuevos widgets nativos sin iframes. Toda la carga es directa y optimizada.</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-10">
            <!-- Selector -->
            <div class="card p-8 h-fit">
                <h3 class="font-black text-slate-900 uppercase tracking-tight mb-6">Configurador</h3>
                <div class="space-y-6">
                    <div>
                        <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 block">Dominio a probar</label>
                        <input type="text" id="test-domain" class="input font-mono" placeholder="ej: gympro.xyz">
                    </div>
                    <div>
                        <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 block">Módulo</label>
                        <select id="test-module" class="input bg-white">
                            <option value="gymnutricion">Nutrición</option>
                            <option value="gymrutinas">Rutinas</option>
                            <option value="gymentrenadores">Entrenadores</option>
                        </select>
                    </div>
                    <button id="run-test" class="w-full btn btn-primary py-4 font-black uppercase tracking-widest text-xs shadow-xl shadow-blue-600/20">
                        EJECUTAR PRUEBA <i class="fas fa-play ml-2"></i>
                    </button>
                </div>

                <div class="mt-10 pt-10 border-t border-slate-100">
                    <h4 class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-4">Código Generado</h4>
                    <div class="bg-slate-900 rounded-xl p-4 relative group">
                        <code id="generated-code" class="text-emerald-400 text-[10px] block break-all font-mono leading-relaxed">
                            <!-- Code will appear here -->
                        </code>
                        <button id="copy-snippet" class="absolute right-2 top-2 text-slate-500 hover:text-white transition-colors hidden">
                            <i class="fas fa-copy"></i>
                        </button>
                    </div>
                </div>
            </div>

            <!-- Preview Window -->
            <div class="lg:col-span-2">
                <div class="bg-white rounded-[40px] shadow-2xl border-4 border-slate-200 overflow-hidden min-h-[700px] flex flex-col">
                    <div class="bg-slate-100 px-6 py-3 flex items-center gap-3 border-b border-slate-200">
                        <div class="flex gap-1.5">
                            <div class="w-3 h-3 rounded-full bg-red-400"></div>
                            <div class="w-3 h-3 rounded-full bg-yellow-400"></div>
                            <div class="w-3 h-3 rounded-full bg-green-400"></div>
                        </div>
                        <div class="bg-white rounded-full flex-grow py-1 px-4 text-[10px] font-mono text-slate-400 border border-slate-200 truncate">
                            https://mi-sitio-externo.com/index.html
                        </div>
                    </div>
                    <div id="test-container" class="p-8 flex-grow bg-[#fafafa]">
                        <div id="empty-state" class="flex flex-col items-center justify-center py-40 text-slate-300">
                            <i class="fas fa-vial text-6xl mb-6 opacity-20"></i>
                            <p class="font-bold uppercase tracking-widest text-sm">Esperando configuración...</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Cargamos wisbeUI globalmente para el lab -->
    <script src="wisbeUI.js"></script>
    <script type="module">
        import { renderNavbar, Auth, showPopup } from './assets/js/utils.js';

        async function init() {
            renderNavbar();
            const user = await Auth.checkAccess(['gym-admin', 'gym-owner']);

            if (user && user.domain) {
                document.getElementById('test-domain').value = user.domain;
            }

            const runBtn = document.getElementById('run-test');
            runBtn.addEventListener('click', () => {
                const domain = document.getElementById('test-domain').value.trim();
                const module = document.getElementById('test-module').value;
                const container = document.getElementById('test-container');
                const codeDisplay = document.getElementById('generated-code');
                const copyBtn = document.getElementById('copy-snippet');

                if (!domain) {
                    showPopup('Error', 'Ingresa un dominio para probar', 'error');
                    return;
                }

                const snippet = `<script src="${window.location.origin}/wisbeUI.js"><\/script>\n<wisbe-${module} domain="${domain}"></wisbe-${module}>`;
                codeDisplay.innerText = snippet;
                copyBtn.classList.remove('hidden');

                // Limpiar contenedor y preparar inyección nativa
                container.innerHTML = `
                    <div style="margin-bottom: 24px; padding: 12px; background: #eff6ff; border-radius: 16px; font-size: 11px; color: #1e40af; font-weight: 800; text-align: center; border: 1px solid #bfdbfe; text-transform: uppercase; letter-spacing: 1px;">
                        <i class="fas fa-microchip mr-2"></i> Inyectando Custom Element Wisbe en entorno nativo
                    </div>
                    <wisbe-${module} domain="${domain}"></wisbe-${module}>
                `;

                showPopup('Prueba Iniciada', 'El componente se está renderizando nativamente sin iframes.');
            });

            document.getElementById('copy-snippet').onclick = () => {
                const text = document.getElementById('generated-code').innerText;
                navigator.clipboard.writeText(text).then(() => {
                    showPopup('Copiado', 'El código nativo está en tu portapapeles.');
                });
            };
        }

        init().catch(err => {
            console.error('[Lab Critical]', err);
        });
    </script>
</body>
</html>
