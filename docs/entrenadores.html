<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Equipo Profesional</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="./assets/css/styleGYM.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-50 min-h-screen">
    <nav id="main-nav"></nav>

    <main class="container mx-auto px-4 py-12">
        <header class="text-center mb-20 animate-fade">
            <h1 class="text-4xl font-black text-slate-900 tracking-tight uppercase mb-4 tracking-tighter">Equipo de Especialistas</h1>
            <p class="text-slate-500 font-medium max-w-xl mx-auto">Profesionales certificados dedicados a maximizar tu potencial y alcanzar tus metas.</p>
        </header>

        <div id="trainers-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-12 animate-fade">
            <!-- Cargando -->
            <div class="col-span-full py-20 text-center">
                <i class="fas fa-spinner fa-spin text-3xl text-blue-500 mb-4"></i>
                <p class="text-xs font-black text-slate-400 uppercase tracking-widest">Sincronizando perfiles profesionales...</p>
            </div>
        </div>
    </main>

    <script type="module">
        import { supabase, renderNavbar } from './assets/js/utils.js';

        // Manejador de errores global para visualización
        window.onerror = function(msg, url, lineNo, columnNo, error) {
            console.error('[Wisbe Error]', msg, error);
            const container = document.getElementById('trainers-container');
            if (container) {
                container.innerHTML = `<div class="col-span-full text-center text-red-500 py-20 font-bold">Error de Sistema: ${msg}</div>`;
            }
            return false;
        };

        renderNavbar();

        const container = document.getElementById('trainers-container');

        async function fetchTrainers() {
            const params = new URLSearchParams(window.location.search);
            const domain = params.get('domain');

            if (!domain) {
                container.innerHTML = '<div class="col-span-full py-20 text-center text-slate-500 font-bold"><i class="fas fa-plug mb-4 text-4xl block"></i>Módulo de Integración Wisbe.<br><span class="text-sm font-medium">Este contenido debe ser visualizado desde el dominio del cliente.</span></div>';
                return;
            }

            console.log('[Wisbe] Buscando equipo para el dominio:', domain);
            container.innerHTML = '<div class="col-span-full py-20 text-center text-slate-400 font-medium"><i class="fas fa-sync fa-spin mb-4 text-4xl block"></i>Conectando equipo...</div>';

            try {
                let cleanDomain = domain.trim().replace(/^https?:\/\//, '').replace(/^www\./, '').split('/')[0];

                // Intento 1: Exacto
                let { data: userData, error: userError } = await supabase.from('wisbe_users')
                    .select('id, full_name')
                    .ilike('domain', domain.trim())
                    .eq('role', 'gym-owner')
                    .maybeSingle();

                // Intento 2: Flexible
                if (!userData) {
                    const { data: userDataFlex } = await supabase.from('wisbe_users')
                        .select('id, full_name')
                        .ilike('domain', `%${cleanDomain}%`)
                        .eq('role', 'gym-owner')
                        .limit(1);
                    userData = userDataFlex ? userDataFlex[0] : null;
                }

                if (userError || !userData) {
                    console.error('[Wisbe] Error buscando usuario:', userError);
                    container.innerHTML = '<div class="col-span-full py-20 text-center text-slate-400 font-medium italic">Gimnasio no encontrado o no configurado.</div>';
                    return;
                }

                console.log('[Wisbe] Usuario conectado:', userData.full_name);

                let query = supabase.from('gym_trainers').select('*').eq('owner_id', userData.id).order('created_at', { ascending: false });

                const { data, error } = await query;
                if (error) {
                    console.error('[Wisbe] Error cargando entrenadores:', error);
                    container.innerHTML = `<div class="col-span-full text-center text-red-500 py-20 font-bold">Error de conexión: ${error.message}</div>`;
                    return;
                }

                console.log('[Wisbe] Entrenadores cargados:', (data || []).length);

                if (!data || data.length === 0) {
                    container.innerHTML = '<div class="col-span-full py-20 text-center text-slate-400 font-medium italic">Aún no se han registrado profesionales para este gimnasio.</div>';
                    return;
                }

                renderTrainers(data);
            } catch (err) {
                console.error('[Wisbe Critical Error]', err);
                container.innerHTML = `<div class="col-span-full text-center text-red-500 py-20 font-bold">Error Crítico: ${err.message}</div>`;
            }
        }

        function renderTrainers(trainers) {
            if (trainers.length === 0) {
                container.innerHTML = '<div class="col-span-full py-20 text-center text-slate-400 font-medium italic">No se han registrado entrenadores para este dominio.</div>';
                return;
            }

            container.innerHTML = trainers.map(t => `
                <div class="card bg-white group hover:border-blue-500 transition-all flex flex-col items-center text-center p-10 animate-fade">
                    <div class="w-28 h-28 rounded-full border-4 border-slate-50 overflow-hidden mb-8 shadow-sm group-hover:scale-105 transition-transform duration-500">
                        <img src="${t.image_url || 'https://images.unsplash.com/photo-1534438327276-14e5300c3a48?auto=format&fit=crop&q=80'}" class="w-full h-full object-cover">
                    </div>
                    <div class="mb-6">
                        <span class="text-blue-600 text-[10px] font-black uppercase tracking-widest block mb-2 px-3 py-1 bg-blue-50 rounded-full inline-block border border-blue-100">${t.specialty}</span>
                        <h3 class="text-xl font-bold text-slate-900 tracking-tight uppercase">${t.full_name}</h3>
                    </div>
                    <p class="text-slate-500 text-sm leading-relaxed mb-8 line-clamp-3">${t.bio || 'Sin descripción adicional disponible.'}</p>
                    <div class="mt-auto w-full pt-8 border-t border-slate-100 flex gap-4">
                        ${t.whatsapp_url ? `
                            <a href="${t.whatsapp_url}" target="_blank" class="flex-grow btn btn-primary py-3 text-[10px] font-black uppercase tracking-widest shadow-lg shadow-blue-600/20">
                                Contactar <i class="fab fa-whatsapp ml-2"></i>
                            </a>
                        ` : ''}
                        ${t.instagram_url ? `
                            <a href="https://instagram.com/${t.instagram_url.replace('@','')}" target="_blank" class="w-12 h-12 bg-slate-100 text-slate-600 rounded-xl flex items-center justify-center hover:bg-slate-200 hover:text-blue-500 transition-all">
                                <i class="fab fa-instagram text-xl"></i>
                            </a>
                        ` : ''}
                    </div>
                </div>
            `).join('');
        }

        fetchTrainers();
    </script>
</body>
</html>
